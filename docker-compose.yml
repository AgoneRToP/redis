services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
      - minio

  mongo:
    container_name: mongo
    image: mongo:latest
    restart: always
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=test
      - MONGO_INITDB_ROOT_PASSWORD=test
    volumes:
      - mongo_data:/data/db

  redis:
    container_name: redis_dev
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: [ "redis-server", "--protected-mode", "no" ]

  minio:
    container_name: minio
    image: minio/minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=test
      - MINIO_ROOT_PASSWORD=12345678
      - MINIO_BUCKET_DEFAULT=test
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  mongo_data:
  redis_dev_data:
  minio_data:
